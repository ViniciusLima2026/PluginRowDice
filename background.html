<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Ficha Background</title>
</head>
<body>
  <script type="module">
    import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@1.5.0/+esm";

    OBR.onReady(async () => {
      // Garante que os dados iniciais da ficha existam na sala
      const roomMeta = await OBR.room.getMetadata();

      if (!roomMeta["ficha-pericias/data"]) {
        // Salva uma ficha padrão para o jogador quando ele entra pela primeira vez
        await OBR.room.setMetadata({
          "ficha-pericias/data": {
            nome: "Meu Personagem",
            pericias: [
              { id: 1, nome: "Atletismo",  valor: 3,  fixo: true },
              { id: 2, nome: "Furtividade", valor: 1, fixo: true },
              { id: 3, nome: "Percepção",  valor: 4,  fixo: true },
              { id: 4, nome: "Persuasão",  valor: 2,  fixo: true },
              { id: 5, nome: "Arcana",     valor: 0,  fixo: true }
            ]
          }
        });
      }
    });
  </script>
</body>
</html>
